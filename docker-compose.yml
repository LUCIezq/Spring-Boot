services:
  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    env_file:
      - bd.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
